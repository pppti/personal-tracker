<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}护肤品包材管理系统{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/">
            <i class="bi bi-box-seam"></i> 包材管理系统
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link {% if request.path=='/' %}active{% endif %}" href="/">
                        <i class="bi bi-speedometer2"></i> 仪表盘
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if '/suppliers' in request.path %}active{% endif %}" href="/suppliers">
                        <i class="bi bi-people"></i> 供应商
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if '/materials' in request.path %}active{% endif %}" href="/materials">
                        <i class="bi bi-box"></i> 包材
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if '/quotations' in request.path %}active{% endif %}" href="/quotations">
                        <i class="bi bi-tags"></i> 报价单
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if '/purchases' in request.path %}active{% endif %}" href="/purchases">
                        <i class="bi bi-cart"></i> 采购订单
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if '/qualities' in request.path %}active{% endif %}" href="/qualities">
                        <i class="bi bi-clipboard-check"></i> 质检
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/exports/all.xlsx">
                        <i class="bi bi-file-earmark-excel"></i> 导出全部
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container-fluid mt-3">
    {% with msgs = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in msgs %}
    <div class="alert alert-{{ cat }} alert-dismissible fade show" role="alert">
        {{ msg }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
