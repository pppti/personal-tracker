name: Deploy to Railway

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Railway
        run: |
          RESPONSE=$(curl -s -X POST "https://backboard.railway.com/graphql/v2" \
            -H "Authorization: Bearer ${RAILWAY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"query":"mutation{deployService(input:{projectId:\"ba2cc751-c2dd-487b-b751-e59e643035f1\",serviceId:\"aa06f626-b47b-4eac-a5f9-680d02095f96\",environmentId:\"6d35a02a-1a53-430c-82ae-92ae7ee1c04b\"}){id}}"}')
          echo "Status: $?"
          echo "Response: $RESPONSE"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
