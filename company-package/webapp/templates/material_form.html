{% extends "base.html" %}
{% block title %}{% if m %}编辑包材{% else %}新增包材{% endif %}{% endblock %}
{% block content %}

<h5>{% if m %}编辑包材: {{ m.name }}{% else %}新增包材{% endif %}</h5>

<form method="post" class="row g-3 mt-1">
    <div class="col-12"><h6 class="border-bottom pb-1">基本信息</h6></div>
    <div class="col-md-3">
        <label class="form-label small">编码 *</label>
        <input type="text" name="code" class="form-control form-control-sm" value="{{ m.code if m else '' }}" required {% if m %}readonly{% endif %}>
    </div>
    <div class="col-md-3">
        <label class="form-label small">名称 *</label>
        <input type="text" name="name" class="form-control form-control-sm" value="{{ m.name if m else '' }}" required>
    </div>
    <div class="col-md-3">
        <label class="form-label small">分类 *</label>
        <select name="category_id" class="form-select form-select-sm" required>
            <option value="">-- 选择分类 --</option>
            {% for c in categories %}
            <option value="{{ c.id }}" {% if m and m.category_id==c.id %}selected{% endif %}>
                {{ c.full_path }}
            </option>
            {% endfor %}
        </select>
    </div>
    <div class="col-md-3">
        <label class="form-label small">材质类型</label>
        <select name="material_type" class="form-select form-select-sm">
            <option value="">--</option>
            {% set mat_types = ['高白玻璃','普白玻璃','PET','PP','PE','亚克力','PE软管','铝塑复合','全塑复合','白卡纸','铜版纸','灰板','特种纸','不干胶','PET标签','PVC标签','瓦楞纸','其他'] %}
            {% for t in mat_types %}<option value="{{ t }}" {% if m and m.material_type==t %}selected{% endif %}>{{ t }}</option>{% endfor %}
        </select>
    </div>
    <div class="col-md-3">
        <label class="form-label small">容量/规格</label>
        <input type="text" name="spec_capacity" class="form-control form-control-sm" placeholder="30ml / 50g / 100*80*50mm" value="{{ m.spec_capacity if m else '' }}">
    </div>
    <div class="col-md-3">
        <label class="form-label small">颜色</label>
        <input type="text" name="spec_color" class="form-control form-control-sm" placeholder="透明/磨砂白/实色" value="{{ m.spec_color if m else '' }}">
    </div>
    <div class="col-md-3">
        <label class="form-label small">表面处理</label>
        <input type="text" name="spec_finish" class="form-control form-control-sm" placeholder="磨砂/光面/喷涂/电镀" value="{{ m.spec_finish if m else '' }}">
    </div>
    <div class="col-md-3">
        <label class="form-label small">印刷工艺</label>
        <input type="text" name="printing_process" class="form-control form-control-sm" placeholder="丝印/烫金" value="{{ m.printing_process if m else '' }}">
    </div>
    <div class="col-md-3">
        <label class="form-label small">印刷色数</label>
        <input type="text" name="printing_colors" class="form-control form-control-sm" placeholder="四色+专色" value="{{ m.printing_colors if m else '' }}">
    </div>

    <div class="col-12"><h6 class="border-bottom pb-1 mt-2">模具与产品</h6></div>
    <div class="col-md-2">
        <div class="form-check mt-4"><input class="form-check-input" type="checkbox" name="has_custom_mold" value="1" id="hcm" {% if m and m.has_custom_mold %}checked{% endif %}> <label class="form-check-label small" for="hcm">需要开模</label></div>
    </div>
    <div class="col-md-2">
        <label class="form-label small">模具归属</label>
        <select name="mold_owner" class="form-select form-select-sm">
            <option value="">--</option>
            <option value="COMPANY" {% if m and m.mold_owner=='COMPANY' %}selected{% endif %}>我司</option>
            <option value="SUPPLIER" {% if m and m.mold_owner=='SUPPLIER' %}selected{% endif %}>供应商</option>
            <option value="SHARED" {% if m and m.mold_owner=='SHARED' %}selected{% endif %}>共用</option>
        </select>
    </div>
    <div class="col-md-2">
        <label class="form-label small">模具寿命（万次）</label>
        <input type="text" name="mold_lifecycle" class="form-control form-control-sm" value="{{ m.mold_lifecycle if m else '' }}">
    </div>
    <div class="col-md-6">
        <label class="form-label small">适用产品类型</label>
        <input type="text" name="suitable_for" class="form-control form-control-sm" placeholder="精华/乳液/面霜/爽肤水/洁面" value="{{ m.suitable_for if m else '' }}">
    </div>

    <div class="col-12"><h6 class="border-bottom pb-1 mt-2">采购信息</h6></div>
    <div class="col-md-2">
        <label class="form-label small">单位</label>
        <input type="text" name="unit" class="form-control form-control-sm" value="{{ m.unit if m else '个' }}">
    </div>
    <div class="col-md-2">
        <label class="form-label small">最小起订量</label>
        <input type="number" name="min_order_qty" class="form-control form-control-sm" value="{{ m.min_order_qty if m else '' }}">
    </div>
    <div class="col-md-2">
        <label class="form-label small">常规交期（天）</label>
        <input type="number" name="typical_lead_time" class="form-control form-control-sm" value="{{ m.typical_lead_time if m else '' }}">
    </div>
    <div class="col-md-3">
        <label class="form-label small">状态</label>
        <select name="status" class="form-select form-select-sm">
            <option value="ACTIVE" {% if m and m.status=='ACTIVE' %}selected{% endif %}>在用</option>
            <option value="DEVELOPING" {% if m and m.status=='DEVELOPING' %}selected{% endif %}>开发中</option>
            <option value="DISCONTINUED" {% if m and m.status=='DISCONTINUED' %}selected{% endif %}>已停用</option>
        </select>
    </div>
    <div class="col-md-12">
        <div class="form-check form-check-inline"><input class="form-check-input" type="checkbox" name="need_food_grade" value="1" id="nfg" {% if m and m.need_food_grade %}checked{% endif %}> <label class="form-check-label small" for="nfg">需食品级认证</label></div>
        <div class="form-check form-check-inline"><input class="form-check-input" type="checkbox" name="need_medical_cert" value="1" id="nmc" {% if m and m.need_medical_cert %}checked{% endif %}> <label class="form-check-label small" for="nmc">需医疗器械认证</label></div>
    </div>
    <div class="col-md-12">
        <label class="form-label small">备注</label>
        <textarea name="remark" class="form-control form-control-sm" rows="2">{{ m.remark if m else '' }}</textarea>
    </div>

    <div class="col-12 mt-3">
        <button type="submit" class="btn btn-primary">保存</button>
        <a href="{% if m %}/materials/{{ m.id }}{% else %}/materials{% endif %}" class="btn btn-outline-secondary ms-2">取消</a>
    </div>
</form>
{% endblock %}
