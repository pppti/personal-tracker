{% extends "base.html" %}
{% block title %}包材管理{% endblock %}
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="mb-0"><i class="bi bi-box"></i> 包材管理</h5>
    <div class="d-flex gap-2">
        <a href="/exports/materials.xlsx{% if request.query_string %}?{{ request.query_string.decode() }}{% endif %}" class="btn btn-outline-success btn-sm"><i class="bi bi-file-earmark-excel"></i> 导出</a>
        <a href="/materials/new" class="btn btn-primary btn-sm"><i class="bi bi-plus-lg"></i> 新增包材</a>
    </div>
</div>

<div class="card mb-3">
    <div class="card-body py-2">
        <form class="row g-2" method="get">
            <div class="col-md-4">
                <input type="text" name="search" class="form-control form-control-sm" placeholder="搜索编码/名称" value="{{ search }}">
            </div>
            <div class="col-md-4">
                <select name="category" class="form-select form-select-sm">
                    <option value="">全部分类</option>
                    {% for c in categories %}
                    <option value="{{ c.id }}" {% if category==c.id|string %}selected{% endif %}>{{ c.full_path }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-sm btn-outline-primary w-100"><i class="bi bi-search"></i> 筛选</button>
            </div>
        </form>
    </div>
</div>

<table class="table table-sm table-hover align-middle">
    <thead class="table-light">
        <tr><th>编码</th><th>名称</th><th>分类</th><th>材质</th><th>规格</th><th>状态</th><th>操作</th></tr>
    </thead>
    <tbody>
    {% for m in materials %}
    <tr>
        <td><a href="/materials/{{ m.id }}">{{ m.code }}</a></td>
        <td>{{ m.name }}</td>
        <td><small class="text-muted">{{ m.cat_path }}</small></td>
        <td>{{ m.material_type or '-' }}</td>
        <td>{{ m.spec_capacity or '-' }}</td>
        <td><span class="badge bg-{{ status_badge(m.status) }}">{{ m.status }}</span></td>
        <td>
            <a href="/materials/{{ m.id }}/edit" class="btn btn-outline-secondary btn-xs"><i class="bi bi-pencil"></i></a>
            <a href="/materials/{{ m.id }}" class="btn btn-outline-primary btn-xs"><i class="bi bi-eye"></i></a>
        </td>
    </tr>
    {% endfor %}
    </tbody>
</table>
{% endblock %}
